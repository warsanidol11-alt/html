<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soldier Registration</title>
<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #e5e5e5;
    }

    .container {
        max-width: 800px;
        margin: 40px auto;
        padding: 25px;
        background: #1a1a1a;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: normal;
        color: #ffffff;
    }

    fieldset {
        border: 1px solid #333;
        margin-bottom: 20px;
        padding: 15px;
        border-radius: 6px;
    }

    legend {
        padding: 0 8px;
        font-size: 14px;
        color: #bbb;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
    }

    label {
        display: block;
        font-size: 12px;
        margin-bottom: 4px;
        color: #aaa;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px 10px;
        border-radius: 5px;
        border: 1px solid #333;
        background: #111;
        color: #eee;
        font-size: 13px;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #666;
    }

    .inline {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        margin-top: 5px;
    }

    .inline label {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
    }

    textarea { resize: vertical; }

    .actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }

    button {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #333;
        background: #222;
        color: #eee;
        cursor: pointer;
        font-size: 14px;
    }

    button:hover {
        background: #2a2a2a;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Soldier Registration</h1>

    <form action="https://microsoft.com">

        <fieldset>
            <legend>Identity</legend>
            <div class="grid">
                <div>
                    <label>First Name</label>
                    <input type="text" value="John">
                </div>
                <div>
                    <label>Last Name</label>
                    <input type="text" value="Doe">
                </div>
                <div>
                    <label>Email</label>
                    <input type="email" value="john.doe@email.com">
                </div>
                <div>
                    <label>Phone</label>
                    <input type="tel" value="+1234567890">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Military</legend>
            <div class="grid">
                <div>
                    <label>Rank</label>
                    <select>
                        <option>Private</option>
                        <option selected>Sergeant</option>
                        <option>Captain</option>
                    </select>
                </div>
                <div>
                    <label>Service Number</label>
                    <input type="text" value="SRV-10234">
                </div>
                <div>
                    <label>Date</label>
                    <input type="date" value="2024-01-15">
                </div>
                <div>
                    <label>Fitness</label>
                    <input type="range" value="70">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Equipment</legend>
            <div class="grid">
                <div>
                    <label>Primary Weapon</label>
                    <input type="text" value="M4 Carbine">
                </div>
                <div>
                    <label>Secondary Weapon</label>
                    <input type="text" value="Glock 19">
                </div>
                <div>
                    <label>Gear</label>
                    <input list="gear" value="Helmet">
                    <datalist id="gear">
                        <option>Helmet</option>
                        <option>Drone</option>
                        <option>Night Vision</option>
                    </datalist>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Capabilities</legend>
            <div class="inline">
                <label><input type="checkbox" checked> Sniper</label>
                <label><input type="checkbox"> Medic</label>
                <label><input type="checkbox" checked> Engineer</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Notes</legend>
            <textarea rows="3">Experienced field operative with multiple deployments.</textarea>
        </fieldset>

        <div class="actions">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>

    </form>
</div>

</body>
</html>
